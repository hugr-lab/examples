"Weather fact table"
type Weather @table(name: "dbo.Weather") {
  "Date reference"
  date_id: Int! @pk @field_source(field: "DateID")
    @field_references(
      name: "weather_date_fk"
      references_name: "Date"
      field: "id"
      query: "date"
      description: "Date for this weather record"
      references_query: "weather"
      references_description: "Weather records for this date"
    )
  "Geography reference"
  geography_id: Int! @pk @field_source(field: "GeographyID")
    @field_references(
      name: "weather_geography_fk"
      references_name: "Geography"
      field: "id"
      query: "geography"
      description: "Geography for this weather record"
      references_query: "weather"
      references_description: "Weather records for this geography"
    )
  "Precipitation in inches"
  precipitation_inches: Float @field_source(field: "PrecipitationInches")
  "Average temperature in Fahrenheit"
  avg_temperature_fahrenheit: Float @field_source(field: "AvgTemperatureFahrenheit")
}

"Trip fact table — the central fact table linking dimensions"
type Trip @table(name: "dbo.Trip") {
  "Date reference"
  date_id: Int! @pk @field_source(field: "DateID")
    @field_references(
      name: "trip_date_fk"
      references_name: "Date"
      field: "id"
      query: "date"
      description: "Date for this trip"
      references_query: "trips"
      references_description: "Trips on this date"
    )
  "Medallion (taxi cab) reference"
  medallion_id: Int! @pk @field_source(field: "MedallionID")
    @field_references(
      name: "trip_medallion_fk"
      references_name: "Medallion"
      field: "id"
      query: "medallion"
      description: "Medallion (taxi cab) for this trip"
      references_query: "trips"
      references_description: "Trips for this medallion"
    )
  "Hackney license reference"
  hackney_license_id: Int! @pk @field_source(field: "HackneyLicenseID")
    @field_references(
      name: "trip_hackney_license_fk"
      references_name: "HackneyLicense"
      field: "id"
      query: "hackney_license"
      description: "Hackney license for this trip"
      references_query: "trips"
      references_description: "Trips for this hackney license"
    )
  "Pickup time reference"
  pickup_time_id: Int @field_source(field: "PickupTimeID")
    @field_references(
      name: "trip_pickup_time_fk"
      references_name: "Time"
      field: "id"
      query: "pickup_time"
      description: "Pickup time for this trip"
      references_query: "pickup_trips"
      references_description: "Trips with this pickup time"
    )
  "Dropoff time reference"
  dropoff_time_id: Int @field_source(field: "DropoffTimeID")
    @field_references(
      name: "trip_dropoff_time_fk"
      references_name: "Time"
      field: "id"
      query: "dropoff_time"
      description: "Dropoff time for this trip"
      references_query: "dropoff_trips"
      references_description: "Trips with this dropoff time"
    )
  "Pickup geography reference"
  pickup_geography_id: Int @field_source(field: "PickupGeographyID")
    @field_references(
      name: "trip_pickup_geography_fk"
      references_name: "Geography"
      field: "id"
      query: "pickup_geography"
      description: "Pickup geography for this trip"
      references_query: "pickup_trips"
      references_description: "Trips picked up in this geography"
    )
  "Dropoff geography reference"
  dropoff_geography_id: Int @field_source(field: "DropoffGeographyID")
    @field_references(
      name: "trip_dropoff_geography_fk"
      references_name: "Geography"
      field: "id"
      query: "dropoff_geography"
      description: "Dropoff geography for this trip"
      references_query: "dropoff_trips"
      references_description: "Trips dropped off in this geography"
    )
  "Pickup latitude"
  pickup_latitude: Float @field_source(field: "PickupLatitude")
  "Pickup longitude"
  pickup_longitude: Float @field_source(field: "PickupLongitude")
  "Pickup latitude/longitude string"
  pickup_lat_long: String @field_source(field: "PickupLatLong")
  "Dropoff latitude"
  dropoff_latitude: Float @field_source(field: "DropoffLatitude")
  "Dropoff longitude"
  dropoff_longitude: Float @field_source(field: "DropoffLongitude")
  "Dropoff latitude/longitude string"
  dropoff_lat_long: String @field_source(field: "DropoffLatLong")
  "Number of passengers"
  passenger_count: Int @field_source(field: "PassengerCount")
  "Trip duration in seconds"
  trip_duration_seconds: Int @field_source(field: "TripDurationSeconds")
  "Trip distance in miles"
  trip_distance_miles: Float @field_source(field: "TripDistanceMiles")
  "Payment type (Cash, Credit, etc.)"
  payment_type: String @field_source(field: "PaymentType")
  "Base fare amount"
  fare_amount: Float @field_source(field: "FareAmount")
  "Surcharge amount"
  surcharge_amount: Float @field_source(field: "SurchargeAmount")
  "Tax amount"
  tax_amount: Float @field_source(field: "TaxAmount")
  "Tip amount"
  tip_amount: Float @field_source(field: "TipAmount")
  "Tolls amount"
  tolls_amount: Float @field_source(field: "TollsAmount")
  "Total trip amount"
  total_amount: Float @field_source(field: "TotalAmount")
}
