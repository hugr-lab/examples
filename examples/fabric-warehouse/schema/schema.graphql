"Date dimension table"
type Date @table(name: "dbo.Date") {
  "Date identifier"
  id: Int! @pk @field_source(field: "DateID")
  "Date value"
  date: Timestamp @field_source(field: "Date")
  "Date business key"
  business_key: String @field_source(field: "DateBKey")
  "Day of the month"
  day_of_month: String @field_source(field: "DayOfMonth")
  "Day suffix (st, nd, rd, th)"
  day_suffix: String @field_source(field: "DaySuffix")
  "Day name (Monday, Tuesday, etc.)"
  day_name: String @field_source(field: "DayName")
  "Day of the week number"
  day_of_week: String @field_source(field: "DayOfWeek")
  "Day of week in month"
  day_of_week_in_month: String @field_source(field: "DayOfWeekInMonth")
  "Day of week in year"
  day_of_week_in_year: String @field_source(field: "DayOfWeekInYear")
  "Day of quarter"
  day_of_quarter: String @field_source(field: "DayOfQuarter")
  "Day of year"
  day_of_year: String @field_source(field: "DayOfYear")
  "Week of month"
  week_of_month: String @field_source(field: "WeekOfMonth")
  "Week of quarter"
  week_of_quarter: String @field_source(field: "WeekOfQuarter")
  "Week of year"
  week_of_year: String @field_source(field: "WeekOfYear")
  "Month number"
  month: String @field_source(field: "Month")
  "Month name"
  month_name: String @field_source(field: "MonthName")
  "Month of quarter"
  month_of_quarter: String @field_source(field: "MonthOfQuarter")
  "Quarter number"
  quarter: String @field_source(field: "Quarter")
  "Quarter name"
  quarter_name: String @field_source(field: "QuarterName")
  "Year"
  year: String @field_source(field: "Year")
  "Year name"
  year_name: String @field_source(field: "YearName")
  "Month-Year label"
  month_year: String @field_source(field: "MonthYear")
  "MMYYYY formatted date"
  mmyyyy: String @field_source(field: "MMYYYY")
  "First day of month"
  first_day_of_month: Date @field_source(field: "FirstDayOfMonth")
  "Last day of month"
  last_day_of_month: Date @field_source(field: "LastDayOfMonth")
  "First day of quarter"
  first_day_of_quarter: Date @field_source(field: "FirstDayOfQuarter")
  "Last day of quarter"
  last_day_of_quarter: Date @field_source(field: "LastDayOfQuarter")
  "First day of year"
  first_day_of_year: Date @field_source(field: "FirstDayOfYear")
  "Last day of year"
  last_day_of_year: Date @field_source(field: "LastDayOfYear")
  "Is a US holiday"
  is_holiday_usa: Boolean @field_source(field: "IsHolidayUSA")
  "Is a weekday"
  is_weekday: Boolean @field_source(field: "IsWeekday")
  "US holiday name"
  holiday_usa: String @field_source(field: "HolidayUSA")
}

