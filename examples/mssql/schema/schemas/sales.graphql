# Adventure Works - Sales Schema
# This schema defines the Sales schema entities.

"Sales territories by region."
type SalesTerritory @table(name: "Sales.SalesTerritory") @module(name: "sales") {
  "Unique identifier for the territory"
  TerritoryID: Int! @pk
  "Territory name"
  Name: String!
  "Country/region code"
  CountryRegionCode: String! @field_references(
    name: "territory_country_fk"
    references_name: "CountryRegion"
    field: "CountryRegionCode"
    query: "country"
    description: "Country"
    references_query: "territories"
    references_description: "Sales territories"
  )
  "Territory group"
  Group: String!
  "Sales year to date"
  SalesYTD: Float!
  "Sales last year"
  SalesLastYear: Float!
  "Cost year to date"
  CostYTD: Float!
  "Cost last year"
  CostLastYear: Float!
  "Last modification timestamp"
  ModifiedDate: Timestamp!
}

