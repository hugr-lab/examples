    field: "TerritoryID"
    query: "territory"
    description: "Sales territory"
    references_query: "sales_people"
    references_description: "Sales people in this territory"
  )
  "Sales quota"
  SalesQuota: Float
  "Bonus amount"
  Bonus: Float!
  "Commission percentage"
  CommissionPct: Float!
  "Sales year to date"
  SalesYTD: Float!
  "Sales last year"
  SalesLastYear: Float!
  "Last modification timestamp"
  ModifiedDate: Timestamp!
}

