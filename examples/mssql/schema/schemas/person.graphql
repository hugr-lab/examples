    field: "BusinessEntityID"
    query: "person"
    description: "Person"
    references_query: "email_addresses"
    references_description: "Email addresses"
  )
  "Email address identifier"
  EmailAddressID: Int! @pk
  "Email address"
  EmailAddress: String
  "Last modification timestamp"
  ModifiedDate: Timestamp!
}

