  PhoneNumber: String! @pk
  "Phone number type reference"
  PhoneNumberTypeID: Int! @pk @field_references(
    name: "phone_type_fk"
    references_name: "PhoneNumberType"
    field: "PhoneNumberTypeID"
    query: "phone_type"
    description: "Phone number type"
    references_query: "phones"
    references_description: "Phones of this type"
  )
  "Last modification timestamp"
  ModifiedDate: Timestamp!
}

