"Products sold or used in manufacturing."
type Product @table(name: "Production.Product") @module(name: "production") {
  "Unique identifier for the product"
  ProductID: Int! @pk
  "Product name"
  Name: String!
  "Product number/SKU"
  ProductNumber: String!
  "Flag: product is manufactured in-house"
  MakeFlag: Boolean!
  "Flag: product is a finished good"
  FinishedGoodsFlag: Boolean!
  "Product color"
  Color: String
  "Safety stock level"
  SafetyStockLevel: Int!
  "Reorder point"
  ReorderPoint: Int!
  "Standard manufacturing cost"
  StandardCost: Float!
  "List price"
  ListPrice: Float!
  "Product size"
  Size: String
  "Size unit measure code"
  SizeUnitMeasureCode: String @field_references(
    name: "product_size_unit_fk"
    references_name: "UnitMeasure"
    field: "UnitMeasureCode"
    query: "size_unit"
    description: "Size unit"
    references_query: "products_by_size"
    references_description: "Products using this size unit"
  )
  "Weight unit measure code"
  WeightUnitMeasureCode: String @field_references(
    name: "product_weight_unit_fk"
    references_name: "UnitMeasure"
    field: "UnitMeasureCode"
    query: "weight_unit"
    description: "Weight unit"
    references_query: "products_by_weight"
    references_description: "Products using this weight unit"
  )
  "Product weight"
  Weight: Float
  "Days to manufacture"
  DaysToManufacture: Int!
  "Product line (R=Road, M=Mountain, T=Touring, S=Standard)"
  ProductLine: String
  "Product class (H=High, M=Medium, L=Low)"
  Class: String
  "Product style (U=Unisex, M=Men, W=Women)"
  Style: String
  "Subcategory reference"
  ProductSubcategoryID: Int @field_references(
    name: "product_subcat_fk"
    references_name: "ProductSubcategory"
    field: "ProductSubcategoryID"
    query: "subcategory"
    description: "Product subcategory"
    references_query: "products"
    references_description: "Products in this subcategory"
  )
  "Model reference"
  ProductModelID: Int @field_references(
    name: "product_model_fk"
    references_name: "ProductModel"
    field: "ProductModelID"
    query: "model"
    description: "Product model"
    references_query: "products"
    references_description: "Products using this model"
  )
  "Sell start date"
  SellStartDate: Timestamp!
  "Sell end date"
  SellEndDate: Timestamp
  "Discontinued date"
  DiscontinuedDate: Timestamp
  "Last modification timestamp"
  ModifiedDate: Timestamp!
}

