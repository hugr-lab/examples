# Adventure Works - Production Schema
# This schema defines the Production schema entities.

"Units of measure for products."
type UnitMeasure @table(name: "Production.UnitMeasure") @module(name: "production") {
  "Unit measure code"
  UnitMeasureCode: String! @pk
  "Unit measure name"
  Name: String!
  "Last modification timestamp"
  ModifiedDate: Timestamp!
}

"Top-level product categories."
type ProductCategory @table(name: "Production.ProductCategory") @module(name: "production") {
  "Unique identifier for the product category"
  ProductCategoryID: Int! @pk
  "Category name"
  Name: String!
  "Last modification timestamp"
  ModifiedDate: Timestamp!
}

"Product subcategories within categories."
type ProductSubcategory @table(name: "Production.ProductSubcategory") @module(name: "production") {
  "Unique identifier for the subcategory"
  ProductSubcategoryID: Int! @pk
  "Parent category reference"
  ProductCategoryID: Int! @field_references(
    name: "subcat_cat_fk"
    references_name: "ProductCategory"
    field: "ProductCategoryID"
    query: "category"
    description: "Parent category"
    references_query: "subcategories"
    references_description: "Subcategories"
  )
  "Subcategory name"
  Name: String!
  "Last modification timestamp"
  ModifiedDate: Timestamp!
}

